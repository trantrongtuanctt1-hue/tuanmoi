name: 15M ULTRA Signal Bot

on:
  workflow_dispatch:      # manual trigger
  schedule:
    # Keep-alive: GitHub kills idle actions after 6h
    # We restart every 5h55m via schedule
    - cron: '*/355 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # ~5h55m, just under GitHub's 6h limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS=${{ secrets.TELEGRAM_CHAT_IDS }}
          BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}
          SCAN_INTERVAL_MINUTES=${{ vars.SCAN_INTERVAL_MINUTES || '5' }}
          MIN_ALERT_SCORE=${{ vars.MIN_ALERT_SCORE || '7' }}
          MIN_VOLUME_USD=${{ vars.MIN_VOLUME_USD || '50000000' }}
          MAX_SYMBOLS=${{ vars.MAX_SYMBOLS || '30' }}
          EOF

      - name: Run bot
        run: python main.py
